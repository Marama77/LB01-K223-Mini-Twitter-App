version: '3.8'

services:
  backend:
    build: .
    ports:
      - "4200:4200"
    volumes:
      - ./server:/app/server
      - ./client:/app/client
      - ./minitwitter.db:/app/minitwitter.db
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    command: npm run dev:server -- --host 0.0.0.0
